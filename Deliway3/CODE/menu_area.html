<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 - 지역별</title>
</head>
<body>
    <h1>매장 리스트</h1>
    <input type="text" id="search" placeholder="매장 검색..." onkeyup="filterStores()">

    <div id="storeList" class="store-list">
        <div class="store">
            <h2>서울점</h2>
            <p>서울특별시 강남구</p>
        </div>
        <div class="store">
            <h2>부산점</h2>
            <p>부산광역시 해운대구</p>
        </div>
        <div class="store">
            <h2>대구점</h2>
            <p>대구광역시 중구</p>
        </div>
        <div class="store">
            <h2>인천점</h2>
            <p>인천광역시 남동구</p>
        </div>
    </div>
</body>
</html>
