<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 리스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: #f9f9f9;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff6347;
    }

    .store-list {
      list-style: none;
      padding: 0;
    }

    .store-item {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .store-item:hover {
      background: #ffe5d9;
    }

    .store-name {
      font-size: 18px;
      font-weight: bold;
    }

    .store-address {
      font-size: 14px;
      color: #666;
    }

    .like-btn {
      padding: 5px 10px;
      background: #ff6347;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .like-btn.liked {
      background: #4caf50;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>🍽️ 맛집 리스트</h1>
    <ul class="store-list" id="storeList"></ul>
  </div>

  <script>
    // 매장 데이터 (백엔드 연동 전까지 하드코딩)
    const stores = [
      { id: 1, name: '김밥천국', address: '서울시 강남구 테헤란로 123' },
      { id: 2, name: '불타는 고기집', address: '서울시 마포구 홍대입구 456' },
      { id: 3, name: '초밥의 정석', address: '서울시 서초구 반포대로 789' },
      { id: 4, name: '짜장 잘하는 집', address: '서울시 종로구 청계천로 101' }
    ];

    const storeList = document.getElementById('storeList');

    // 매장 리스트 DOM에 추가
    function renderStores() {
      storeList.innerHTML = '';
      stores.forEach(store => {
        const li = document.createElement('li');
        li.className = 'store-item';
        li.innerHTML = `
          <div>
            <div class="store-name">${store.name}</div>
            <div class="store-address">${store.address}</div>
          </div>
          <button class="like-btn" onclick="toggleLike(${store.id}, this)">❤️ 좋아요</button>
        `;
        storeList.appendChild(li);
      });
    }

    // 좋아요 토글 기능
    function toggleLike(id, btn) {
      btn.classList.toggle('liked');
      btn.textContent = btn.classList.contains('liked') ? '💚 좋아요 취소' : '❤️ 좋아요';
    }

    // 초기 로딩 시 매장 리스트 렌더링
    renderStores();

  </script>
</body>

</html>
